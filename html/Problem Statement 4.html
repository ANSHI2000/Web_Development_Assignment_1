<!--Problem Statement 4
Create a web page of customer profile for data entry of customer’s in a Hotel, The profile shouldinclude Name, Address, Age, gender, Room Type (A/C, Non-A/C or Deluxe), Type of payment (Cash, Credit/Debit Card or Coupons).
-->



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hotel Customer Profile</title>
<style>
body {
font-family: Arial, sans-serif; background-color: #1f86ec;
}
.container { width: 420px;
margin: 40px auto; background: #db0a0a; padding: 20px 25px; border-radius: 8px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
text-align: center; margin-bottom: 20px;
}
label {
display: block; margin-top: 10px; font-weight: bold;
}
input[type="text"], input[type="number"], textarea {
width: 100%; padding: 8px; margin-top: 5px;
border: 1px solid #cccccc;

border-radius: 4px;
}
textarea { resize: none;
}
.options {
margin-top: 5px;
}
.options input { margin-right: 6px;
}
.btn {
margin-top: 20px; width: 100%; padding: 10px;
background-color: #a90b94; border: none;
color: white; font-size: 16px;
border-radius: 4px; cursor: pointer;
}
.btn:hover {
background-color: #0056b3;
}
</style>
</head>
<body>
<div class="container">
<h2>Customer Profile Form</h2>
<form>
<label>Customer Name</label>
<input type="text" name="name" required />
<label>Address</label>
<textarea name="address" rows="3" required></textarea>
<label>Age</label>
<input type="number" name="age" min="1" required />
<label>Gender</label>
<div class="options">
<input type="radio" name="gender" value="Male" /> Male
<input type="radio" name="gender" value="Female" /> Female
<input type="radio" name="gender" value="Other" /> Other
</div>

<label>Room Type</label>
<div class="options">
<input type="radio" name="room" value="AC" /> A/C
<input type="radio" name="room" value="Non-AC" /> Non A/C
<input type="radio" name="room" value="Deluxe" /> Deluxe
</div>
<label>Type of Payment</label>
<div class="options">
<input type="checkbox" name="payment" value="Cash" /> Cash
<input type="checkbox" name="payment" value="Card" /> Credit / Debit Card
<input type="checkbox" name="payment" value="Coupons" /> Coupons
</div>
<button type="submit" class="btn">Submit</button>
</form>
</div>

</body>
</html>
