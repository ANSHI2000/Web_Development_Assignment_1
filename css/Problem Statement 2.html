<!--Problem Statement 2
Create Box Shadow and text Shadow using CSS3.
-->


<!DOCTYPE html>
<html>
<head>
<style>
.box {
width: 200px; height: 100px;
background-color: #4CAF50;
box-shadow: 10px 10px 15px rgba(0, 0, 0, 0.4); margin: 50px;
}
.text{
color: rgba(246, 109, 18, 0.965); font-size: 20px;
line-height: 100px;
text-shadow: 30px 40px 2px rgba(0, 0, 0, 0.4); margin: 50px;
}
</style>
</head>
<body>
<div class="box"></div>
<div class="text">Shadow Text</div>
</body>
</html>
