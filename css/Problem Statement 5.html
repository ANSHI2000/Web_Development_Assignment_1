<!-- Problem Statement 5
 Create a web page to position a background image and repeat the image horizontally or vertically.
-->


<!DOCTYPE html>
<html>
<head>
<title>Background Image Repeat</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
}
.horizontal { height: 200px;
background-image: url("https://picsum.photos/200/200"); background-repeat: repeat-x; /* repeats horizontally */ background-position: top left; /* position */
border: 2px solid black;
}
.vertical { height: 400px;
background-image: url("https://picsum.photos/200/200"); background-repeat: repeat-y; /* repeats vertically */ background-position: center; /* position */
border: 2px solid black;
}
h2 {
text-align: center;
}

</style>
</head>
<body>
<h2>Horizontal Background Repeat</h2>
<div class="horizontal"></div>
<h2>Vertical Background Repeat</h2>
<div class="vertical"></div>


</body>
</html>
