<!-- Problem Statement 1:
 Create a web page to show all hyperlinks with following specification:
1.Default color is pink.
2.Active color is blue
3.Visited color is Green
4.Hyperlink should be without underline.
-->


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyperlink Colors</title>
<style>
a:link {
color: pink;
text-decoration: none;
}
a:visited { color: green;
text-decoration: none;
}
a:hover {
color: orange;
text-decoration: underline;
}
a:active { color: blue;
text-decoration: none;
}
</style>
</head>
<body>


<h2>Hyperlink Color Demonstration</h2>


<p>
<a href="https://www.google.com">Google</a><br><br>
<a href="https://www.wikipedia.org">Wikipedia</a><br><br>
<a href="https://www.github.com">GitHub</a>
</p>


</body>
</html>
