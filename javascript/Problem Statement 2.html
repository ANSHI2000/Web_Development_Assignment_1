<!-- Problem Statement 2
Store some country names and their capitals. Ask the user to select a country and its capital from two lists. If the match is correct, display “Correct answer”; otherwise, displayanerrormessage and tell the correct answer.
-->

<!DOCTYPE html>
<html>
<head>
<title>Country and Capital Match</title>
<style>
body {
font-family: Arial; background-color: #f2f2f2; text-align: center;
margin-top: 100px;
}


.box {
width: 400px; margin: auto; padding: 20px; background: white; border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}


select, button { width: 80%; padding: 10px;

margin: 10px 0;
}


#result {
font-weight: bold; margin-top: 15px;
}
</style>
</head>
<body>
<div class="box">
<h2>Country and Capital Matching</h2>
<label>Select Country:</label><br>
<select id="country">
<option value="">--Select Country--</option>
<option value="India">India</option>
<option value="USA">USA</option>
<option value="Japan">Japan</option>
<option value="France">France</option>
</select>
<br>


<label>Select Capital:</label><br>
<select id="capital">
<option value="">--Select Capital--</option>
<option value="New Delhi">New Delhi</option>
<option value="Washington D.C.">Washington D.C.</option>
<option value="Tokyo">Tokyo</option>
<option value="Paris">Paris</option>

</select>
<br>
<button onclick="checkAnswer()">Submit</button>
<p id="result"></p>
</div>
<script>
function checkAnswer() {
let country = document.getElementById("country").value; let capital = document.getElementById("capital").value; let result = document.getElementById("result");

let capitals = {
"India": "New Delhi",
"USA": "Washington D.C.",
"Japan": "Tokyo",
"France": "Paris"
};
if (country === "" || capital === "") {
result.innerHTML = "Please select both country and capital."; result.style.color = "red";
return;
}
if (capitals[country] === capital) { result.innerHTML = "Correct Answer!"; result.style.color = "green";
} else {
result.innerHTML = "Wrong Answer! Correct capital of " + country + " is " + capitals[country];
result.style.color = "red";

}
}
</script>
</body>
</html>
