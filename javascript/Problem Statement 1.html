<!--Problem Statement 1
 Design a web page to validate the following according to the standard conditions. a. Name  b. E-Mail-id and c. Password.
-->


<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>
<style>
body {
font-family: Arial; background: #f2f2f2;
}
.container { width: 350px;
margin: 100px auto; padding: 20px; background: white; border-radius: 10px;
box-shadow: 0 0 10px gray;
}
input {
width: 100%; padding: 8px; margin: 10px 0;
}
button {
width: 100%; padding: 10px;

background: green; color: white; border: none;
}
.error {
color: red;
font-size: 14px;
}
.success { color: green;
}
</style>
</head>
<body>


<div class="container">
<h2>Validation Form</h2>
<form onsubmit="return validateForm()">


<label>Name:</label>
<input type="text" id="name">
<div id="nameError" class="error"></div>


<label>Email:</label>
<input type="text" id="email">
<div id="emailError" class="error"></div>


<label>Password:</label>
<input type="password" id="password">

<div id="passError" class="error"></div>


<button type="submit">Submit</button>
<div id="result" class="success"></div>
</form>
</div>


<script>
function validateForm() {
let name = document.getElementById("name").value; let email = document.getElementById("email").value;
let password = document.getElementById("password").value;


let nameError = document.getElementById("nameError"); let emailError = document.getElementById("emailError"); let passError = document.getElementById("passError"); let result = document.getElementById("result");

nameError.innerHTML = ""; emailError.innerHTML = ""; passError.innerHTML = ""; result.innerHTML = "";

let valid = true;
let namePattern = /^[A-Za-z]{3,}$/; if (!namePattern.test(name)) {
nameError.innerHTML = "Enter valid name (only letters, min 3 chars)"; valid = false;
}

let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if (!emailPattern.test(email)) {
emailError.innerHTML = "Enter valid email address"; valid = false;
}
let passPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/; if (!passPattern.test(password)) {
passError.innerHTML = "Password must be 8+ chars with uppercase, lowercase, number & special char";
valid = false;
}
if (valid) {
result.innerHTML = "Form submitted successfully!";
}
return valid;
}
</script>
</body>
</html>
