<!-- Problem Statement 3
Design the simple Calculator.
-->


<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>
<style>
body {
font-family: Arial; display: flex;
justify-content: center;
align-items: center; height: 100vh;
background-color: #f4f4f4;
}
.calculator { background: white; padding: 20px; border-radius: 10px;
box-shadow: 0 0 10px rgb(5, 195, 237);
}
input {
width: 100%; height: 40px; font-size: 20px; text-align: right;
margin-bottom:20px;
}

button { width: 50px;
height: 50px; margin: 10px; font-size: 18px;
}
</style>
</head>
<body>
<div class="calculator">
<input type="text" id="display" disabled>
<div>
<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="appendValue('/')">/</button>
<button onclick="appendValue('*')">*</button>
</div>
<div>
<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('-')">-</button>
</div>
<div>
<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('+')">+</button>
</div>

<div>
<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="calculate()">=</button>
</div>
<div>
<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
</div>
</div>
<script>
function appendValue(value) { document.getElementById("display").value += value;
}
function clearDisplay() { document.getElementById("display").value = "";
}
function deleteLast() {
let current = document.getElementById("display").value; document.getElementById("display").value = current.slice(0, -1);
}
function calculate() { try {
let result = eval(document.getElementById("display").value); document.getElementById("display").value = result;
} catch {
document.getElementById("display").value = "Error";
}

}
</script>


</body>
</html>
