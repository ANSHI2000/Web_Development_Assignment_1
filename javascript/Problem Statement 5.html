<!-- Problem Statement 5
 Design a web page that implements a running clock 
-->


<!DOCTYPE html>
<html>
<head>
<title>Running Clock</title>
<style>
body {
background-color: blue; color: rgb(225, 214, 11); font-family: Arial, sans-serif; text-align: center;
margin-top: 150px;
}
#clock {
font-size: 60px;
border: 3px solid rgb(215, 12, 12); padding: 20px;
display: inline-block; border-radius: 10px;
}
</style>
</head>
<body>
<h1>Clock</h1>
<div id="clock"></div>
<script>
function updateClock() {

let now = new Date();
let hours = now.getHours();
let minutes = now.getMinutes(); let seconds = now.getSeconds();
if (hours < 10) hours = "0" + hours;
if (minutes < 10) minutes = "0" + minutes; if (seconds < 10) seconds = "0" + seconds;
let time = hours + ":" + minutes + ":" + seconds; document.getElementById("clock").innerHTML = time;
}
setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
